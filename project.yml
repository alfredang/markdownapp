name: MarkdownVault
options:
  bundleIdPrefix: com.tertiaryinfotech
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "GU9WTSTX9M"
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "Tertiary Markdown"
    INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Tertiary Infotech Academy Pte Ltd"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  MarkdownVault:
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - Sources
      - path: Resources/SampleVault
        type: folder
    dependencies:
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.markdownapp
        PRODUCT_NAME: "Markdown Vault"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Sources/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    # Sandbox is OFF for this personal build: embedded terminals must spawn a real
    # login shell with full filesystem access. This build is NOT App Store eligible.
    entitlements:
      path: Sources/MarkdownVault.entitlements
      properties:
        com.apple.security.app-sandbox: false
