name: MarkdownVault
options:
  bundleIdPrefix: com.tertiaryinfotech
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "Markdown Vault"
    INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Tertiary Infotech Academy Pte Ltd"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"

targets:
  MarkdownVault:
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - Sources
      - path: Resources/SampleVault
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.markdownapp
        PRODUCT_NAME: "Markdown Vault"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: Sources/MarkdownVault.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
